name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.version=${VERSION}"

          mkdir -p dist

          # CLI
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/hydraflow-linux-amd64 ./cmd/hydraflow/
          GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/hydraflow-linux-arm64 ./cmd/hydraflow/
          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/hydraflow-darwin-amd64 ./cmd/hydraflow/
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/hydraflow-darwin-arm64 ./cmd/hydraflow/
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/hydraflow-windows-amd64.exe ./cmd/hydraflow/

          # Subscription server
          GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o dist/hydraflow-sub-linux-amd64 ./tools/sub-server.go
          GOOS=linux GOARCH=arm64 go build -ldflags "-s -w" -o dist/hydraflow-sub-linux-arm64 ./tools/sub-server.go

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/evr1kys/hydraflow:${{ github.ref_name }}
            ghcr.io/evr1kys/hydraflow:latest
