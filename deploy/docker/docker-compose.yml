version: "3.8"

services:
  hydraflow:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: hydraflow
    restart: unless-stopped
    network_mode: host
    volumes:
      - hydraflow-config:/etc/hydraflow
      - hydraflow-data:/var/lib/hydraflow
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:10085/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 64M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=32M

  caddy:
    image: caddy:2-alpine
    container_name: hydraflow-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - TZ=UTC
    depends_on:
      hydraflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:2019/reverse_proxy/upstreams"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true

volumes:
  hydraflow-config:
    driver: local
  hydraflow-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
